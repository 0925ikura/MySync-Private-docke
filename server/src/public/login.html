<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 浏览器数据同步</title>
  <link rel="icon" href="icons/favicon.png" type="image/png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e88e5 0%, #42a5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 48px;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1e88e5 0%, #42a5f5 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: white;
    }

    .login-header h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 8px;
    }

    .login-header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #1e88e5;
      box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1e88e5 0%, #42a5f5 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(30, 136, 229, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: shake 0.5s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .initial-credentials {
      background: #e3f2fd;
      border: 1px solid #1e88e5;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .initial-credentials h3 {
      color: #1e88e5;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .initial-credentials p {
      color: #555;
      line-height: 1.6;
    }

    .cred-row {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }

    .cred-label {
      color: #666;
      font-weight: 500;
    }

    .cred-value {
      color: #333;
      font-family: monospace;
      background: white;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          <path d="M12 8v4l3 3"/>
        </svg>
      </div>
      <h1>浏览器数据同步</h1>
      <p>管理面板登录</p>
    </div>

    <div id="initial-credentials" class="initial-credentials" style="display: none;">
      <h3>⚠️ 首次登录</h3>
      <p>系统已自动生成管理员账号：</p>
      <div class="cred-row">
        <span class="cred-label">用户名:</span>
        <span class="cred-value" id="init-username">admin</span>
      </div>
      <div class="cred-row">
        <span class="cred-label">密码:</span>
        <span class="cred-value" id="init-password">loading...</span>
      </div>
      <p style="margin-top: 8px; color: #c33;">请保存此密码，后续登录需要使用</p>
    </div>

    <div id="error-message" class="error-message"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名">
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
      </div>

      <button type="submit" class="btn-login" id="login-btn">登录</button>
    </form>
  </div>

  <script>
    const API_BASE = '';
    let initialCreds = null;

    document.addEventListener('DOMContentLoaded', init);

    async function init() {
      await checkInitialCredentials();
      setupLoginForm();
    }

    async function checkInitialCredentials() {
      try {
        const response = await fetch(`${API_BASE}/api/auth/initial`);
        const data = await response.json();
        
        if (data.hasInitial && data.username && data.password) {
          initialCreds = data;
          document.getElementById('init-username').textContent = data.username;
          document.getElementById('init-password').textContent = data.password;
          document.getElementById('initial-credentials').style.display = 'block';
        }
      } catch (e) {
        console.log('Failed to check initial credentials:', e);
      }
    }

    function setupLoginForm() {
      const form = document.getElementById('login-form');
      const loginBtn = document.getElementById('login-btn');
      const errorMessage = document.getElementById('error-message');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        loginBtn.disabled = true;
        loginBtn.textContent = '登录中...';
        errorMessage.classList.remove('show');

        try {
          const response = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
          });

          const result = await response.json();

          if (result.success) {
            localStorage.setItem('authToken', result.token);
            localStorage.setItem('username', result.username);
            window.location.href = '/';
          } else {
            showError(result.message || '登录失败，请检查用户名和密码');
          }
        } catch (error) {
          showError('网络错误，请稍后重试');
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = '登录';
        }
      });
    }

    function showError(message) {
      const errorMessage = document.getElementById('error-message');
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
      
      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 5000);
    }
  </script>
</body>
</html>
