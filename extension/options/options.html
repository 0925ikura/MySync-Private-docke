<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>同步设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>同步设置</h1>
    </div>

    <div class="content">
      <div class="section">
        <h2>服务器配置</h2>
        <div class="form-group">
          <label for="server-url">WebSocket 服务器地址</label>
          <input type="text" id="server-url" placeholder="ws://localhost:8080" value="ws://localhost:8080">
          <p class="help-text">格式: ws://服务器IP:端口 或 wss://服务器IP:端口</p>
        </div>
        <button class="btn btn-primary" id="save-btn" style="margin-top: 12px;">保存设置</button>
      </div>

      <div class="section">
        <h2>同步开关</h2>
        <div class="toggle-group">
          <div class="toggle-item">
            <div class="toggle-info">
              <span class="toggle-label">书签同步</span>
              <span class="toggle-desc">实时同步书签的增删改</span>
            </div>
            <label class="toggle">
              <input type="checkbox" id="sync-bookmarks" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-group" style="margin-top: 12px; margin-bottom: 0;">
            <label for="bookmarks-limit">最大同步数量</label>
            <input type="number" id="bookmarks-limit" value="500" min="1" max="10000">
          </div>
          <div class="toggle-item" style="margin-top: 12px;">
            <div class="toggle-info">
              <span class="toggle-label">历史记录同步</span>
              <span class="toggle-desc">实时同步浏览历史</span>
            </div>
            <label class="toggle">
              <input type="checkbox" id="sync-history" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-group" style="margin-top: 12px; margin-bottom: 0;">
            <label for="history-limit">最大同步数量</label>
            <input type="number" id="history-limit" value="1000" min="1" max="50000">
          </div>
          <div class="toggle-item" style="margin-top: 12px;">
            <div class="toggle-info">
              <span class="toggle-label">Cookie 同步</span>
              <span class="toggle-desc">实时同步 Cookie 变化</span>
            </div>
            <label class="toggle">
              <input type="checkbox" id="sync-cookies" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-group" style="margin-top: 12px; margin-bottom: 0;">
            <label for="cookies-limit">最大同步数量</label>
            <input type="number" id="cookies-limit" value="200" min="1" max="5000">
          </div>
        </div>
      </div>

      <div class="section">
        <h2>同步统计</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon bookmark-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
              </svg>
            </div>
            <div class="stat-info">
              <span class="stat-value" id="bookmarks-count">0</span>
              <span class="stat-label">书签</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon history-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <div class="stat-info">
              <span class="stat-value" id="history-count">0</span>
              <span class="stat-label">历史记录</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon cookie-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2a10 10 0 100 20 10 10 0 000-20z"/>
                <path d="M12 12l8 0"/>
              </svg>
            </div>
            <div class="stat-info">
              <span class="stat-value" id="cookies-count">0</span>
              <span class="stat-label">Cookie</span>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>连接状态</h2>
        <div class="status-box">
          <div class="status-indicator" id="status-indicator">
            <span class="status-dot"></span>
            <span class="status-text">检查中...</span>
          </div>
          <button class="btn btn-secondary" id="reconnect-btn">重新连接</button>
        </div>
      </div>

      <div class="section">
        <h2>同步操作</h2>
        <div class="button-group">
          <button class="btn btn-primary" id="sync-all-btn">立即同步全部</button>
          <button class="btn btn-danger" id="clear-data-btn">清除本地数据</button>
        </div>
      </div>

      <div class="section">
        <h2>关于</h2>
        <div class="about">
          <p>浏览器数据同步插件 v1.0.0</p>
          <p>实时同步书签、历史记录和Cookie到服务器</p>
        </div>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
